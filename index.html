<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Wexon</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:white;font-family:'Inter',sans-serif}
.container{max-width:900px;margin:auto;padding:30px}
.logo{font-size:28px;font-weight:700}
.logo span{color:#3fd0ff}
.center{text-align:center;margin-top:30px}
.avatar{width:140px;height:140px;border-radius:20px;margin-bottom:15px}
.role{color:#3fd0ff;letter-spacing:3px;margin-bottom:20px}
.btn{display:inline-block;padding:12px 35px;border-radius:14px;border:1px solid #2a2a2a;text-decoration:none;color:white;font-weight:600}
.player{margin-top:60px;background:#121212;padding:20px;border-radius:20px}
.cover{width:100%;border-radius:15px;margin-bottom:15px}
.track-title{font-size:18px;font-weight:600;text-align:center}
.controls{display:flex;justify-content:center;align-items:center;gap:20px;margin-top:15px}
.controls button{background:#1c1c1c;border:none;color:white;width:48px;height:48px;border-radius:50%;font-size:18px}
.play{background:#3fd0ff;color:black;width:64px;height:64px;font-size:22px}
.progress{width:100%;margin-top:10px}
.swipe-hint{text-align:center;opacity:.6;font-size:13px;margin-top:8px}
.section{margin-top:50px}
.section h2{margin-bottom:16px}
.tags{display:flex;flex-wrap:wrap;gap:10px}
.tag{border:1px solid #3fd0ff;padding:7px 14px;border-radius:10px;font-size:13px;color:#3fd0ff}
</style></head><body><div class="container"><div class="logo">wexon<span>.</span></div><div class="center">
<img class="avatar" src="https://t.me/i/userpic/320/Propavshiy_Wexon.jpg">
<h1>Developer</h1>
<div class="role">ANDROID • C++</div>
<a class="btn" href="https://t.me/Propavshiy_Wexon">Telegram</a>
</div><div class="section">
<h2>Технологии</h2>
<div class="tags">
<div class="tag">ANDROID</div>
<div class="tag">KOTLIN</div>
<div class="tag">C++</div>
<div class="tag">JAVA</div>
<div class="tag">NDK</div>
</div>
</div><div class="player" id="player">
<img id="cover" class="cover">
<div class="track-title" id="title"></div>
<input type="range" id="progress" class="progress" value="0"><div class="controls">
<button id="prev">⏮</button>
<button id="play" class="play">▶</button>
<button id="next">⏭</button>
</div><div class="swipe-hint">Свайпни влево или вправо чтобы сменить трек</div>
</div></div><script>
const tracks=[
{title:"Одиноко", src:"dope17.mp3", cover:"https://i.imgur.com/8Km9tLL.jpg"},
{title:"Раны", src:"nancy_rany.mp3", cover:"https://i.imgur.com/4YQZ4ZC.jpg"},
{title:"кровати", src:"murasame_krovati.mp3", cover:"https://i.imgur.com/jYq7X7N.jpg"},
{title:"fallen777angel", src:"fallen777angel.mp3", cover:"https://i.imgur.com/example.jpg"}
];

let index=0;
const audio=new Audio();
const title=document.getElementById("title");
const cover=document.getElementById("cover");
const playBtn=document.getElementById("play");
const prevBtn=document.getElementById("prev");
const nextBtn=document.getElementById("next");
const progress=document.getElementById("progress");
const player=document.getElementById("player");

function loadTrack(i){
  const t=tracks[i];
  audio.src=t.src;
  title.textContent=t.title;
  cover.src=t.cover;
  progress.value=0;
}

loadTrack(index);

playBtn.onclick=()=>{
  if(audio.paused){
    audio.play();
    playBtn.textContent="⏸";
  }else{
    audio.pause();
    playBtn.textContent="▶";
  }
};

prevBtn.onclick=()=>{
  index=(index-1+tracks.length)%tracks.length;
  loadTrack(index);
  audio.play();
};

nextBtn.onclick=()=>{
  index=(index+1)%tracks.length;
  loadTrack(index);
  audio.play();
};

audio.ontimeupdate=()=>{
  progress.value=(audio.currentTime/audio.duration)*100||0;
};

progress.oninput=()=>{
  audio.currentTime=(progress.value/100)*audio.duration;
};

/* Swipe */
let startX=0;
player.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});

player.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;
  if(startX-endX>50){ nextBtn.onclick(); }
  if(endX-startX>50){ prevBtn.onclick(); }
});
</script></body>
</html>
